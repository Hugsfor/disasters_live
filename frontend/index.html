<!DOCTYPE html>
<html lang="ro">

<head>
    <meta charset="UTF-8">
    <title>Disaster Monitor</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@600;800&display=swap"
        rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #07111f;
            --panel: #b670c9;
            --border: rgba(80, 25, 87, 0.08);
            --accent: #ff6b35;
            --normal: #2ecc71;
            --elevated: #f39c12;
            --high: #e67e22;
            --critical: #e74c3c;
            --text: #c8d8e8;
            --muted: #8899aa;
            --font-mono: 'JetBrains Mono', monospace;
            --font-ui: 'Syne', sans-serif;
        }

        body {
            font-family: var(--font-mono);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── HEADER ── */
        header {
            padding: 14px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--panel);
            flex-wrap: wrap;
            gap: 10px;
        }

        .logo {
            font-family: var(--font-ui);
            font-weight: 800;
            font-size: 18px;
            letter-spacing: 0.02em;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .live-dot {
            width: 9px;
            height: 9px;
            background: var(--accent);
            border-radius: 50%;
            animation: pulse-dot 1.4s ease-in-out infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); box-shadow: 0 0 0 0 rgba(255,107,53,0.6); }
            50%       { opacity: 0.85; transform: scale(1.2); box-shadow: 0 0 0 5px rgba(255,107,53,0); }
        }

        .stats-bar {
            display: flex;
            gap: 20px;
            font-size: 11px;
            color: var(--muted);
        }

        .stat-item strong {
            color: #fff;
            font-size: 13px;
        }

        /* ── FILTER BAR ── */
        .filter-bar {
            padding: 12px 24px;
            border-bottom: 1px solid var(--border);
            background: var(--bg);
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .filter-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--muted);
            margin-right: 4px;
        }

        .btn {
            background: var(--panel);
            border: 1px solid var(--border);
            padding: 7px 16px;
            border-radius: 6px;
            cursor: pointer;
            color: var(--text);
            font-family: var(--font-mono);
            font-size: 12px;
            font-weight: 700;
            transition: all 0.15s;
            letter-spacing: 0.03em;
        }

        .btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
            box-shadow: 0 0 14px rgba(255,107,53,0.35);
        }

        .btn:hover:not(.active) {
            border-color: rgba(255,255,255,0.25);
            color: #fff;
            transform: translateY(-1px);
        }

        /* ── MAIN LAYOUT ── */
        .main {
            flex: 1;
            display: flex;
            gap: 0;
            overflow: hidden;
            min-height: 0;
        }

        #map {
            flex: 1;
            min-height: 520px;
            position: relative;
        }

        /* ── SIDEBAR ── */
        .sidebar {
            width: 300px;
            background: var(--panel);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--muted);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .event-list {
            flex: 1;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }

        .event-item {
            padding: 10px 16px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: background 0.12s;
            display: flex;
            gap: 10px;
            align-items: flex-start;
        }

        .event-item:hover { background: rgba(255,255,255,0.04); }

        .event-item.new-event { animation: flash-in 0.6s ease; }

        @keyframes flash-in {
            0%   { background: rgba(255,107,53,0.25); }
            100% { background: transparent; }
        }

        .event-icon { font-size: 18px; line-height: 1; flex-shrink: 0; }

        .event-meta { flex: 1; min-width: 0; }

        .event-type {
            font-family: var(--font-ui);
            font-size: 12px;
            font-weight: 600;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .event-coords {
            font-size: 10px;
            color: var(--muted);
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .event-risk {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            padding: 2px 6px;
            border-radius: 3px;
            flex-shrink: 0;
            align-self: center;
        }

        .risk-critical { background: rgba(231,76,60,0.2);  color: var(--critical); }
        .risk-high     { background: rgba(230,126,34,0.2); color: var(--high); }
        .risk-elevated { background: rgba(243,156,18,0.2); color: var(--elevated); }
        .risk-normal   { background: rgba(46,204,113,0.15); color: var(--normal); }

        /* ── FOOTER ── */
        .footer {
            padding: 8px 24px;
            border-top: 1px solid var(--border);
            background: var(--panel);
            font-size: 11px;
            color: var(--muted);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .status-ok   { color: var(--normal); }
        .status-err  { color: var(--critical); }
        .status-wait { color: var(--muted); }

        /* ── MAP LEGEND ── */
        .legend {
            position: absolute;
            bottom: 30px;
            left: 10px;
            background: rgba(108,62,128,0.85);
            border: 1px solid var(--border);
            padding: 8px 12px;
            border-radius: 8px;
            color: var(--text);
            font-size: 11px;
            z-index: 1000;
            backdrop-filter: blur(6px);
            line-height: 1.8;
        }

        .legend-row { display: flex; align-items: center; gap: 7px; }
        .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

        /* ── LEAFLET POPUP ── */
        .leaflet-popup-content-wrapper {
            background: #1a0a2e;
            color: var(--text);
            border: 1px solid rgba(180,100,210,0.4);
            border-radius: 8px;
            font-family: var(--font-mono);
            font-size: 12px;
        }
        .leaflet-popup-tip { background: #1a0a2e; }

        /* ── PULSE MARKER ── */
        @keyframes pulse-ring {
            0%   { transform: translate(-50%,-50%) scale(0.8); opacity: 0.6; }
            100% { transform: translate(-50%,-50%) scale(2.8); opacity: 0; }
        }

        /* ── TOGGLE ── */
        .refresh-toggle {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            user-select: none;
        }

        .toggle-track {
            width: 30px; height: 16px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 8px;
            position: relative;
            transition: background 0.2s;
        }

        .toggle-track.on { background: var(--accent); border-color: var(--accent); }

        .toggle-thumb {
            width: 10px; height: 10px;
            background: #fff;
            border-radius: 50%;
            position: absolute;
            top: 2px; left: 2px;
            transition: left 0.2s;
        }

        .toggle-track.on .toggle-thumb { left: 16px; }
    </style>
</head>

<body>

    <!-- HEADER -->
    <header>
        <div class="logo">
            <div class="live-dot"></div>
            DISASTER MONITOR
        </div>
        <div class="stats-bar">
            <div class="stat-item">Total: <strong id="statTotal">—</strong></div>
            <div class="stat-item">🏔️ <strong id="statEq">—</strong></div>
            <div class="stat-item">🌊 <strong id="statFlood">—</strong></div>
            <div class="stat-item">🌀 <strong id="statTornado">—</strong></div>
            <div class="stat-item">🔥 <strong id="statDrought">—</strong></div>
            <div class="stat-item">🌊🌊 <strong id="statTsunami">—</strong></div>
        </div>
    </header>

    <!-- FILTER BAR -->
    <div class="filter-bar">
        <span class="filter-label">Filter:</span>
        <button class="btn active" data-filter="all">🌍 Toate</button>
        <button class="btn" data-filter="earthquake">🏔️ Cutremur</button>
        <button class="btn" data-filter="flood">🌊 Inundație</button>
        <button class="btn" data-filter="tsunami">🌊🌊 Tsunami</button>
        <button class="btn" data-filter="tornado">🌀 Tornadă</button>
        <button class="btn" data-filter="drought">🔥 Secetă</button>
    </div>

    <!-- MAIN -->
    <div class="main">
        <div id="map"></div>

        <!-- SIDEBAR -->
        <div class="sidebar">
            <div class="sidebar-header">
                <span>Evenimente active</span>
                <span id="sidebarCount">0</span>
            </div>
            <div class="event-list" id="eventList">
                <div style="padding:20px; color:var(--muted); font-size:12px; text-align:center;">
                    Aștept date de la server...
                </div>
            </div>
        </div>
    </div>

    <!-- FOOTER -->
    <div class="footer">
        <span id="statusText" class="status-wait">🔄 Se conectează la server...</span>
        <label class="refresh-toggle" title="Auto-refresh la 5s">
            <div class="toggle-track on" id="toggleTrack">
                <div class="toggle-thumb"></div>
            </div>
            <span>Auto-refresh</span>
        </label>
    </div>

    <!-- MAP LEGEND (moved inside map by JS) -->
    <div class="legend" id="mapLegend" style="display:none;">
        <div class="legend-row"><div class="legend-dot" style="background:var(--normal)"></div> normal</div>
        <div class="legend-row"><div class="legend-dot" style="background:var(--elevated)"></div> elevated</div>
        <div class="legend-row"><div class="legend-dot" style="background:var(--high)"></div> high</div>
        <div class="legend-row"><div class="legend-dot" style="background:var(--critical)"></div> critical</div>
    </div>

    <script>
        // ── MAP INIT ──
        // World view — map auto-zooms to wherever events actually are
        const map = L.map('map').setView([20.0, 0.0], 2);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        document.getElementById('map').appendChild(document.getElementById('mapLegend'));
        document.getElementById('mapLegend').style.display = 'block';

        let currentLayer = null;
        let currentFilter = 'all';
        let autoRefresh = true;
        let refreshTimer = null;
        let lastEventCount = 0;
        let allEvents = [];

        // ── HELPERS ──
        const TYPE_ICONS = {
            earthquake: '🏔️',
            flood:      '🌊',
            tsunami:    '🌊🌊',
            tornado:    '🌀',
            drought:    '🔥',
        };

        function getColorByRisk(risk) {
            switch (risk) {
                case 'critical': return '#e74c3c';
                case 'high':     return '#e67e22';
                case 'elevated': return '#f39c12';
                default:         return '#2ecc71';
            }
        }

        function getIconByType(type, risk) {
            const color = getColorByRisk(risk);
            return L.divIcon({
                html: `
                    <div style="
                        position:relative;
                        width:16px; height:16px;
                        background:${color};
                        border-radius:50%;
                        border:2px solid rgba(255,255,255,0.8);
                        box-shadow:0 0 10px ${color};
                    "></div>
                    <div style="
                        position:absolute; top:0; left:0;
                        width:16px; height:16px;
                        border-radius:50%;
                        background:${color};
                        opacity:0.35;
                        animation: pulse-ring 2s ease-out infinite;
                        transform-origin: center center;
                    "></div>`,
                iconSize: [16, 16],
                iconAnchor: [8, 8],
                className: ''
            });
        }

        function coordsLabel(lat, lon) {
            const ns = lat >= 0 ? 'N' : 'S';
            const ew = lon >= 0 ? 'E' : 'W';
            return `${Math.abs(lat).toFixed(2)}°${ns}, ${Math.abs(lon).toFixed(2)}°${ew}`;
        }

        // ── SIDEBAR ──
        function updateSidebar(events) {
            const list = document.getElementById('eventList');
            const filtered = events.filter(ev => currentFilter === 'all' || ev.type === currentFilter);
            document.getElementById('sidebarCount').textContent = filtered.length;

            if (filtered.length === 0) {
                list.innerHTML = `<div style="padding:20px; color:var(--muted); font-size:12px; text-align:center;">
                    Niciun eveniment pentru filtrul selectat.
                </div>`;
                return;
            }

            const sorted = [...filtered].sort((a, b) => b.probability - a.probability);
            const isNew  = filtered.length > lastEventCount;

            list.innerHTML = sorted.map((ev, i) => {
                const icon     = TYPE_ICONS[ev.type] || '⚠️';
                const risk     = ev.risk || 'normal';
                const newClass = (isNew && i === 0) ? 'new-event' : '';
                return `<div class="event-item ${newClass}" onclick="flyTo(${ev.latitude},${ev.longitude})">
                    <div class="event-icon">${icon}</div>
                    <div class="event-meta">
                        <div class="event-type">${ev.type}</div>
                        <div class="event-coords">${coordsLabel(ev.latitude, ev.longitude)}</div>
                        <div class="event-coords">Mag: ${ev.magnitude.toFixed(1)} · Rază: ${ev.affected_radius.toFixed(0)} km</div>
                    </div>
                    <div class="event-risk risk-${risk}">${risk}</div>
                </div>`;
            }).join('');
        }

        function flyTo(lat, lon) {
            map.flyTo([lat, lon], 6, { duration: 1.2 });
        }

        // ── STATS ──
        function updateStats(events) {
            document.getElementById('statTotal').textContent   = events.length;
            document.getElementById('statEq').textContent      = events.filter(e => e.type === 'earthquake').length;
            document.getElementById('statFlood').textContent   = events.filter(e => e.type === 'flood').length;
            document.getElementById('statTornado').textContent = events.filter(e => e.type === 'tornado').length;
            document.getElementById('statDrought').textContent = events.filter(e => e.type === 'drought').length;
            document.getElementById('statTsunami').textContent = events.filter(e => e.type === 'tsunami').length;
        }

        // ── MAP RENDER ──
        function renderMap(events) {
            if (currentLayer) map.removeLayer(currentLayer);

            const filtered = events.filter(ev => currentFilter === 'all' || ev.type === currentFilter);
            const group    = L.layerGroup();

            filtered.forEach(ev => {
                const color  = getColorByRisk(ev.risk);
                // Scale radius sensibly: affected_radius is in km, Leaflet wants metres
                const radius = Math.min(ev.affected_radius * 1000, 500000);

                const popupContent = `
                    <b>${TYPE_ICONS[ev.type] || '⚠️'} ${ev.type.toUpperCase()}</b><br>
                    ⚠️ Risk: <span style="color:${color}">${ev.risk}</span><br>
                    📊 Probabilitate: ${(ev.probability * 100).toFixed(1)}%<br>
                    📏 Magnitudine: ${ev.magnitude.toFixed(1)}<br>
                    🎯 Rază afectată: ${ev.affected_radius.toFixed(0)} km<br>
                    📍 ${coordsLabel(ev.latitude, ev.longitude)}<br>
                    🕒 ${new Date(ev.detection_time * 1000).toLocaleString()}
                `;

                L.circle([ev.latitude, ev.longitude], {
                    radius,
                    color,
                    weight: 1.5,
                    fillColor: color,
                    fillOpacity: 0.15
                }).bindPopup(popupContent).addTo(group);

                L.marker([ev.latitude, ev.longitude], {
                    icon: getIconByType(ev.type, ev.risk)
                }).bindPopup(popupContent).addTo(group);
            });

            group.addTo(map);
            currentLayer = group;

            // Auto-zoom to fit all visible events on first load
            if (filtered.length > 0 && lastEventCount === 0) {
                try {
                    const bounds = group.getBounds();
                    if (bounds.isValid()) map.fitBounds(bounds, { padding: [40, 40] });
                } catch(e) {}
            }
        }

        // ── FETCH ──
        function fetchAndDisplay() {
            fetch('http://localhost:8080?t=' + Date.now())
                .then(res => res.json())
                .then(data => {
                    allEvents = data.events || [];
                    const statusEl = document.getElementById('statusText');
                    statusEl.className   = 'status-ok';
                    statusEl.textContent = `📡 ${allEvents.length} evenimente active · ${new Date().toLocaleTimeString()}`;

                    renderMap(allEvents);
                    updateSidebar(allEvents);
                    updateStats(allEvents);
                    lastEventCount = allEvents.filter(ev => currentFilter === 'all' || ev.type === currentFilter).length;
                })
                .catch(() => {
                    const statusEl = document.getElementById('statusText');
                    statusEl.className   = 'status-err';
                    statusEl.textContent = '❌ Nu se poate conecta la server. Rulează backend-ul C.';
                });
        }

        // ── FILTERS ──
        document.querySelectorAll('.btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.getAttribute('data-filter');
                renderMap(allEvents);
                updateSidebar(allEvents);
            });
        });

        // ── AUTO-REFRESH TOGGLE ──
        const toggleTrack = document.getElementById('toggleTrack');
        toggleTrack.addEventListener('click', () => {
            autoRefresh = !autoRefresh;
            toggleTrack.classList.toggle('on', autoRefresh);
            if (autoRefresh) {
                refreshTimer = setInterval(fetchAndDisplay, 5000);
            } else {
                clearInterval(refreshTimer);
                document.getElementById('statusText').textContent = '⏸ Auto-refresh oprit';
                document.getElementById('statusText').className   = 'status-wait';
            }
        });

        // ── START ──
        fetchAndDisplay();
        refreshTimer = setInterval(fetchAndDisplay, 5000);
    </script>
</body>
</html>
